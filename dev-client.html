<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner — Dev Client</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0f10; color: #e0e0e0; padding: 2rem; max-width: 800px; margin: 0 auto; }
  h1 { font-size: 1.4rem; font-weight: 500; margin-bottom: 1.5rem; }
  .input-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  input[type="text"] { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #1a1a1c; color: #e0e0e0; font-size: 14px; outline: none; }
  input:focus { border-color: #6366f1; }
  button { padding: 10px 20px; border-radius: 8px; border: none; background: #6366f1; color: #fff; font-size: 14px; cursor: pointer; font-weight: 500; }
  button:hover { background: #5558e6; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .status { font-size: 13px; color: #888; margin-bottom: 1rem; min-height: 20px; }
  .progress-bar { height: 4px; background: #222; border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: #6366f1; transition: width 0.5s ease; border-radius: 2px; }
  .events { display: flex; flex-direction: column; gap: 10px; }
  .event-card { background: #1a1a1c; border: 1px solid #2a2a2c; border-radius: 10px; padding: 14px; animation: fadeIn 0.3s ease; }
  .event-card.final { border-color: #6366f1; background: #1a1a2c; }
  .event-card.error { border-color: #e24b4a; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .check-name { font-weight: 500; font-size: 14px; }
  .grade { font-size: 20px; font-weight: 600; padding: 2px 10px; border-radius: 6px; }
  .grade-A { background: #064e3b; color: #34d399; }
  .grade-B { background: #1e3a5f; color: #60a5fa; }
  .grade-C { background: #713f12; color: #fbbf24; }
  .grade-D { background: #7c2d12; color: #fb923c; }
  .grade-F { background: #7f1d1d; color: #f87171; }
  .score-text { font-size: 12px; color: #888; margin-bottom: 10px; }
  .details { display: flex; flex-direction: column; gap: 4px; }
  .detail-row { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 4px 8px; border-radius: 4px; }
  .detail-row:nth-child(odd) { background: #111; }
  .status-icon { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-ok { background: #34d399; }
  .status-fail { background: #f87171; }
  .status-warn { background: #fbbf24; }
  .detail-name { font-weight: 500; min-width: 200px; }
  .detail-desc { color: #888; font-size: 12px; }
  .overall { text-align: center; padding: 1.5rem; }
  .overall-grade { font-size: 48px; font-weight: 700; }
  .overall-score { font-size: 14px; color: #888; margin-top: 4px; }
  .raw-toggle { margin-top: 1.5rem; }
  .raw-toggle summary { font-size: 12px; color: #666; cursor: pointer; }
  .raw-events { margin-top: 8px; font-family: monospace; font-size: 11px; background: #111; padding: 12px; border-radius: 8px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; color: #6ee7b7; }
</style>
</head>
<body>
<h1>Scanner de vulnérabilités — Dev Client</h1>

<div class="input-row">
  <input type="text" id="url-input" value="https://github.com" placeholder="https://example.com">
  <button id="scan-btn" onclick="startScan()">Scanner</button>
</div>

<div class="status" id="status"></div>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="events" id="events"></div>

<details class="raw-toggle">
  <summary>Événements SSE bruts</summary>
  <div class="raw-events" id="raw-events"></div>
</details>

<script>
const API_URL = 'http://localhost:8000';

async function startScan() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;

  const btn = document.getElementById('scan-btn');
  const status = document.getElementById('status');
  const progress = document.getElementById('progress');
  const eventsDiv = document.getElementById('events');
  const rawDiv = document.getElementById('raw-events');

  btn.disabled = true;
  eventsDiv.innerHTML = '';
  rawDiv.textContent = '';
  progress.style.width = '0%';
  status.textContent = 'Connexion au serveur...';

  try {
    const response = await fetch(`${API_URL}/scan/stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });

    if (!response.ok) {
      const err = await response.text();
      status.textContent = `Erreur ${response.status}: ${err}`;
      btn.disabled = false;
      return;
    }

    status.textContent = 'Scan en cours — résultats en temps réel...';
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });

      // Parse les événements SSE du buffer
      const parts = buffer.split('\n\n');
      buffer = parts.pop(); // le dernier morceau est peut-être incomplet

      for (const part of parts) {
        if (!part.trim()) continue;

        rawDiv.textContent += part + '\n\n';

        const lines = part.split('\n');
        let eventType = '';
        let eventData = '';

        for (const line of lines) {
          if (line.startsWith('event: ')) eventType = line.slice(7);
          if (line.startsWith('data: ')) eventData = line.slice(6);
        }

        if (!eventType || !eventData) continue;

        const data = JSON.parse(eventData);

        if (eventType === 'check_complete') {
          renderCheck(data, eventsDiv);
          const [done, total] = data.progress.split('/');
          progress.style.width = `${(parseInt(done) / parseInt(total)) * 80}%`;
          status.textContent = `Check terminé : ${data.check_name} (${data.progress})`;
        }

        if (eventType === 'check_error') {
          renderError(data, eventsDiv);
        }

        if (eventType === 'scan_complete') {
          progress.style.width = '100%';
          renderFinal(data, eventsDiv);
          status.textContent = `Scan terminé — ${data.overall_grade} (${data.overall_score}/100)`;
        }
      }
    }
  } catch (err) {
    status.textContent = `Erreur réseau : ${err.message}`;
  }

  btn.disabled = false;
}

function renderCheck(data, container) {
  const card = document.createElement('div');
  card.className = 'event-card';

  const gradeClass = `grade-${data.grade}`;

  let detailsHtml = '';
  if (data.details) {
    detailsHtml = '<div class="details">' + data.details.map(d => `
      <div class="detail-row">
        <span class="status-icon status-${d.status}"></span>
        <span class="detail-name">${d.name}</span>
      </div>
    `).join('') + '</div>';
  }

  card.innerHTML = `
    <div class="card-header">
      <span class="check-name">${data.check_name}</span>
      <span class="grade ${gradeClass}">${data.grade}</span>
    </div>
    <div class="score-text">${data.score}/100 — sévérité ${data.severity}</div>
    ${detailsHtml}
  `;
  container.appendChild(card);
}

function renderError(data, container) {
  const card = document.createElement('div');
  card.className = 'event-card error';
  card.innerHTML = `
    <div class="card-header">
      <span class="check-name">${data.check_name}</span>
      <span class="grade grade-F">ERR</span>
    </div>
    <div class="score-text">${data.error}</div>
  `;
  container.appendChild(card);
}

function renderFinal(data, container) {
  const card = document.createElement('div');
  card.className = 'event-card final';
  const gradeClass = `grade-${data.overall_grade}`;
  card.innerHTML = `
    <div class="overall">
      <div class="overall-grade ${gradeClass}" style="display:inline-block;padding:8px 24px;border-radius:12px;">${data.overall_grade}</div>
      <div class="overall-score">Score global : ${data.overall_score}/100</div>
      <div class="overall-score">${data.checks.length} checks — scan_id: ${data.scan_id}</div>
    </div>
  `;
  container.appendChild(card);
}
</script>
</body>
</html>
